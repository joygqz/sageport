<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sageport</title>

    <!--
      Critical theme bootstrap. Runs before the app bundle (and before first
      paint) so the window never flashes the wrong color while loading. The
      storage keys mirror src/themes/apply.ts; the fallback background is the
      default theme (Dark Modern).
    -->
    <script>
      (function () {
        var bg = "#1f1f1f";
        var scheme = "dark";
        try {
          bg = localStorage.getItem("sageport.theme.bg") || bg;
          scheme = localStorage.getItem("sageport.theme.scheme") || scheme;
        } catch (e) {
          /* localStorage unavailable, keep defaults */
        }
        var root = document.documentElement;
        root.style.backgroundColor = bg;
        root.style.colorScheme = scheme;
        if (scheme === "dark") root.classList.add("dark");
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
