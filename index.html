<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sageport</title>

    <script>
      (function () {
        var bg = "#171b28";
        var scheme = "dark";
        try {
          bg = localStorage.getItem("sageport.theme.bg") || bg;
          scheme = localStorage.getItem("sageport.theme.scheme") || scheme;
        } catch (e) {}
        var root = document.documentElement;
        root.style.backgroundColor = bg;
        root.style.colorScheme = scheme;
        if (scheme === "dark") root.classList.add("dark");
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
