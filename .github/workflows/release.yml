name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve tag
        id: tag
        env:
          CANDIDATE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if [[ ! "$CANDIDATE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Invalid release tag: $CANDIDATE_TAG" >&2
            exit 1
          fi
          printf 'value=%s\n' "$CANDIDATE_TAG" >> "$GITHUB_OUTPUT"

  verify:
    needs: prepare
    uses: ./.github/workflows/verify.yml
    with:
      ref: ${{ needs.prepare.outputs.tag }}

  release:
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Generate changelog and create draft release
        id: release
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          FROM_ARGS=()
          if ! git tag --list 'v*.*.*' | grep -vFx "$TAG" | grep -q .; then
            # First-ever release: changelogithub always excludes its "from"
            # boundary commit, and with no prior tag it defaults that boundary
            # to the repo's first commit - silently dropping it from the
            # changelog. Diff against git's well-known empty-tree commit
            # instead so the full history is included.
            EMPTY_TREE=4b825dc642cb6eb9a060e54bf8d69288fbee4904
            FROM=$(git commit-tree "$EMPTY_TREE" -m "empty")
            FROM_ARGS=(--from "$FROM")
          fi
          npx changelogithub@14 --draft --to "$TAG" --name "Sageport $TAG" "${FROM_ARGS[@]}"
          release_id=$(gh release view "$TAG" --json databaseId -q .databaseId)
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

  build:
    needs: [prepare, release]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: ./.github/actions/setup-linux-deps
        if: matrix.platform == 'ubuntu-22.04'

      - uses: ./.github/actions/setup-toolchain
        with:
          rust-targets: ${{ matrix.rust-targets }}

      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required Actions secret: $name"
              exit 1
            fi
          done

          CERTIFICATE_PATH="$RUNNER_TEMP/apple-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/apple-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | awk -F'"' '/Developer ID Application/ { print $2; exit }'
          )"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "::error::The certificate does not contain a Developer ID Application identity"
            exit 1
          fi

          {
            printf 'APPLE_SIGNING_IDENTITY=%s\n' "$SIGNING_IDENTITY"
            printf 'APPLE_ID=%s\n' "$APPLE_ID"
            printf 'APPLE_PASSWORD=%s\n' "$APPLE_PASSWORD"
            printf 'APPLE_TEAM_ID=%s\n' "$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Sync OAuth client ids (see docs/sync-oauth-setup.md) — compiled
          # in via `option_env!`, so a missing secret just disables that
          # provider's sign-in instead of failing the build.
          SAGEPORT_GITHUB_CLIENT_ID: ${{ secrets.SAGEPORT_GITHUB_CLIENT_ID }}
          SAGEPORT_GOOGLE_CLIENT_ID: ${{ secrets.SAGEPORT_GOOGLE_CLIENT_ID }}
          SAGEPORT_GOOGLE_CLIENT_SECRET: ${{ secrets.SAGEPORT_GOOGLE_CLIENT_SECRET }}
          SAGEPORT_MS_CLIENT_ID: ${{ secrets.SAGEPORT_MS_CLIENT_ID }}
        with:
          releaseId: ${{ needs.release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Publish release
        run: gh release edit "${{ needs.prepare.outputs.tag }}" --draft=false

  cleanup:
    if: failure()
    needs: [prepare, release, build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Delete orphaned draft release
        if: needs.release.outputs.release_id != ''
        run: gh release delete "${{ needs.prepare.outputs.tag }}" --yes
