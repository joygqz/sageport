name: Setup Linux build dependencies
description: Installs system libraries required to build the Tauri app on Linux

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli*
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libssl-dev \
          libxdo-dev \
          patchelf
