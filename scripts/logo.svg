<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Sageport — master app icon (single source of truth).
    Edit this file, then run `pnpm icon` to regenerate every platform icon.
    Motif: the letter "S" drawn as a tunnel path between two endpoint ports
    (local ↔ remote over SSH), teal→cyan stroke on deep graphite.
  -->
  <defs>
    <!-- deep graphite background -->
    <linearGradient id="bg" x1="512" y1="80" x2="512" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#252E3B"/>
      <stop offset="1" stop-color="#10141A"/>
    </linearGradient>
    <!-- teal → cyan along the path (terminal / network) -->
    <linearGradient id="path" x1="648" y1="390" x2="376" y2="634" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="0.5" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <!-- faint top light for depth -->
    <linearGradient id="sheen" x1="512" y1="80" x2="512" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glyphShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- rounded-squircle background (≈22% radius, iOS style) -->
  <rect x="80" y="80" width="864" height="864" rx="196" fill="url(#bg)"/>
  <rect x="80" y="80" width="864" height="864" rx="196" fill="url(#sheen)"/>
  <!-- hairline inner highlight for definition on dark desktops -->
  <rect x="83" y="83" width="858" height="858" rx="193" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="3"/>

  <!-- glyph: "S" as a tunnel path, twin elliptical arcs (rx 136 / ry 122 —
       near-circular, so curvature stays even and the curve reads smooth).
       Terminals stop at the ellipses' extreme x, flush with the opposite
       bowl's outer edge; endpoints = ports -->
  <g filter="url(#glyphShadow)">
    <path d="M 648 390 A 136 122 0 1 0 512 512 A 136 122 0 1 1 376 634"
          stroke="url(#path)" stroke-width="86" stroke-linecap="round"/>
    <!-- endpoint ports -->
    <circle cx="648" cy="390" r="30" fill="#FFFFFF"/>
    <circle cx="376" cy="634" r="30" fill="#FFFFFF"/>
  </g>
</svg>
