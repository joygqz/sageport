<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Sageport — master app icon (single source of truth).
    Edit this file, then run `pnpm icon` to regenerate every platform icon.
    Motif: a terminal prompt `>_` (SSH / shell) on a teal→cyan "port" gradient.
    Brand hue ≈ 200, matching the primary token in src/styles/globals.css.
  -->
  <defs>
    <!-- teal → cyan (terminal / network / port) -->
    <linearGradient id="bg" x1="160" y1="120" x2="864" y2="904" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.55" stop-color="#0E9CB8"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <!-- top-light overlay for subtle depth -->
    <linearGradient id="sheen" x1="512" y1="80" x2="512" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glyphShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#06323E" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- rounded-squircle background (≈22% radius, iOS style) -->
  <rect x="80" y="80" width="864" height="864" rx="200" fill="url(#bg)"/>
  <rect x="80" y="80" width="864" height="864" rx="200" fill="url(#sheen)"/>

  <!-- glyph: `>_` prompt -->
  <g filter="url(#glyphShadow)" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- chevron -->
    <polyline points="372,360 552,512 372,664" stroke-width="74"/>
    <!-- cursor / underscore -->
    <line x1="600" y1="664" x2="760" y2="664" stroke-width="74"/>
  </g>
</svg>
